name: CI Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: backend/package.json

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Lint
        run: |
          cd backend
          npm run lint

      - name: Run Type-Check
        run: |
          cd backend
          npm run type-check

      - name: Run Tests
        env:
          NODE_ENV: test
          MONGODB_URI: mongodb://localhost:27017/nexus-wallet-test
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MASTER_WALLET_PRIVATE_KEY: ${{ secrets.MASTER_WALLET_PRIVATE_KEY }}
          MASTER_WALLET_ENABLED: true
        run: |
          cd backend
          npm run test:ci

      - name: Run Build
        run: |
          cd backend
          npm run build

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Lint
        run: |
          cd frontend
          npm run lint

      - name: Run Build
        run: |
          cd frontend
          npm run build
